name: 发布 APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装构建所需 SDK 组件
        run: |
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: 授予 gradlew 执行权限
        run: chmod +x ./gradlew

      - name: 构建 Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: 定位并重命名 APK 文件
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          VERSION_TAG="${GITHUB_REF_NAME}"
          RENAMED_APK="app/build/outputs/apk/debug/app-releases-${VERSION_TAG}.apk"
          cp "$APK_PATH" "$RENAMED_APK"
          echo "apk_path=$RENAMED_APK" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename "$RENAMED_APK")" >> $GITHUB_OUTPUT

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: app-releases-${{ github.ref_name }}
          path: ${{ steps.apk.outputs.apk_path }}

      - name: 创建 GitHub Release 并附加 APK
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.apk_path }}
          generate_release_notes: true
          draft: false
          prerelease: false
