name: 发布 APK

on:
  push:
    tags:
      - 'v*'
    branches:
      - debug
      - release
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装构建所需 SDK 组件
        run: |
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: 授予 gradlew 执行权限
        run: chmod +x ./gradlew

      - name: 准备签名文件
        env:
          PM_RELEASE_KEYSTORE_B64: ${{ secrets.PM_RELEASE_KEYSTORE_B64 }}
        run: |
          mkdir -p app/keystore
          echo "$PM_RELEASE_KEYSTORE_B64" | base64 -d > app/keystore/release.jks

      - name: 选择构建类型
        id: build_type
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" || "${GITHUB_REF_NAME}" == "release" ]]; then
            echo "variant=Release" >> $GITHUB_OUTPUT
            echo "output_dir=app/build/outputs/apk/release" >> $GITHUB_OUTPUT
            echo "artifact_prefix=app-releases" >> $GITHUB_OUTPUT
          else
            echo "variant=Debug" >> $GITHUB_OUTPUT
            echo "output_dir=app/build/outputs/apk/debug" >> $GITHUB_OUTPUT
            echo "artifact_prefix=app-debug" >> $GITHUB_OUTPUT
          fi

      - name: 构建 APK
        env:
          PM_RELEASE_STORE_FILE: app/keystore/release.jks
          PM_RELEASE_STORE_PASSWORD: ${{ secrets.PM_RELEASE_STORE_PASSWORD }}
          PM_RELEASE_KEY_ALIAS: ${{ secrets.PM_RELEASE_KEY_ALIAS }}
          PM_RELEASE_KEY_PASSWORD: ${{ secrets.PM_RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assemble${{ steps.build_type.outputs.variant }} --stacktrace --max-workers=1

      - name: 定位并重命名 APK 文件
        id: apk
        run: |
          APK_PATH=$(find "${{ steps.build_type.outputs.output_dir }}" -name "*.apk" | head -n 1)
          VERSION_TAG="${GITHUB_REF_NAME}"
          RENAMED_APK="${{ steps.build_type.outputs.output_dir }}/${{ steps.build_type.outputs.artifact_prefix }}-${VERSION_TAG}.apk"
          cp "$APK_PATH" "$RENAMED_APK"
          echo "apk_path=$RENAMED_APK" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename "$RENAMED_APK")" >> $GITHUB_OUTPUT

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build_type.outputs.artifact_prefix }}-${{ github.ref_name }}
          path: ${{ steps.apk.outputs.apk_path }}

      - name: 创建 GitHub Release 并附加 APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.apk_path }}
          generate_release_notes: true
          draft: false
          prerelease: false
